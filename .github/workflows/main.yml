name: Deploy Code
on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Setup Node
      uses: actions/setup-node@v3
      with:
        node-version: '16.x'
    - name: Run npm install
      run: npm install
    - name: Build Code
      run: |
        echo Building code,
        npm run-script build
    - name: Deploy 🚀 
      uses: JamesIves/github-pages-deploy-action@4.4.1
      with:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        BRANCH: gh-pages 
        FOLDER: build 
